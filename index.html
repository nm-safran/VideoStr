<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduPortal — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --panel: #1a1a2e;
      --border: #2a2a48;
      --accent: #00d4ff;
      --accent2: #0099ff;
      --accent3: #a855f7;
      --text: #f8f9fb;
      --muted: #8b92a3;
      --error: #ff4757;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(0, 212, 255, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(168, 85, 247, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse 100% 100% at 50% 50%, rgba(0, 153, 255, 0.08) 0%, transparent 70%);
      pointer-events: none;
      animation: bgPulse 12s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      from { opacity: 0.6; }
      to   { opacity: 1; }
    }

    /* floating particles */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.08) 1px, transparent 1px),
                        radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.08) 1px, transparent 1px),
                        radial-gradient(circle at 40% 20%, rgba(0, 153, 255, 0.06) 1px, transparent 1px);
      background-size: 200px 200px, 300px 300px, 250px 250px;
      pointer-events: none;
      opacity: 0.5;
    }

    .card {
      position: relative;
      z-index: 10;
      background: rgba(26, 26, 46, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 24px;
      padding: 52px 48px;
      width: 100%;
      max-width: 440px;
      box-shadow: 
        0 8px 32px rgba(0, 212, 255, 0.15),
        0 24px 64px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      border-image: linear-gradient(135deg, rgba(0, 212, 255, 0.4), rgba(168, 85, 247, 0.3)) 1;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #00d4ff, #a855f7);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 24px rgba(0, 212, 255, 0.4), inset 0 0 12px rgba(255, 255, 255, 0.1);
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #f8f9fb, #a8b5c7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-text span { 
      background: linear-gradient(135deg, #00d4ff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #00d4ff, #f8f9fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 36px;
      font-weight: 400;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      background: rgba(13, 13, 26, 0.8);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 15px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-bottom: 22px;
      background: linear-gradient(135deg, rgba(13, 13, 26, 0.9), rgba(26, 26, 46, 0.5));
    }

    input::placeholder {
      color: rgba(139, 146, 163, 0.7);
    }

    input:focus {
      border-color: var(--accent);
      background: linear-gradient(135deg, rgba(13, 13, 26, 0.95), rgba(26, 26, 46, 0.7));
      box-shadow: 
        0 0 20px rgba(0, 212, 255, 0.3),
        inset 0 0 12px rgba(0, 212, 255, 0.08);
    }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, #00d4ff, #a855f7);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      letter-spacing: 0.5px;
      margin-top: 6px;
      box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
      text-transform: uppercase;
    }

    .btn:hover { 
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(0, 212, 255, 0.4), 0 0 20px rgba(168, 85, 247, 0.2);
    }
    
    .btn:active { 
      transform: translateY(-1px);
    }

    .error-msg {
      background: rgba(255, 71, 87, 0.12);
      border: 1.5px solid rgba(255, 71, 87, 0.4);
      border-radius: 10px;
      padding: 13px 16px;
      color: #ff6b7a;
      font-size: 14px;
      margin-bottom: 22px;
      display: none;
      font-weight: 500;
    }

    .footer-note {
      text-align: center;
      margin-top: 28px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }

    .privacy-note {
      margin-top: 14px;
      font-size: 12px;
      line-height: 1.6;
      color: rgba(139, 146, 163, 0.8);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <div class="logo-text">Edu<span>Portal</span></div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to access your courses</p>

    <div class="error-msg" id="errorMsg">Invalid username or password.</div>

    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />

    <button class="btn" onclick="handleLogin()">Sign In →</button>

    <div class="footer-note">Contact your administrator if you need access.</div>
    <div class="privacy-note">For security, successful logins are recorded with IP-based approximate location and device details.</div>
  </div>

  <script src="data.js"></script>
  <script>
    // Redirect if already logged in
    const session = JSON.parse(localStorage.getItem('session') || 'null');
    if (session) {
      window.location.href = session.role === 'admin' ? 'admin.html' : 'dashboard.html';
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    function trackLogin(loginData) {
      const endpoint = 'login-tracker.php?action=log';
      const payload = JSON.stringify(loginData);

      try {
        if (navigator.sendBeacon) {
          const blob = new Blob([payload], { type: 'application/json' });
          navigator.sendBeacon(endpoint, blob);
          return;
        }
      } catch (_) {}

      fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: payload,
        keepalive: true
      }).catch(() => {});
    }

    function completeLogin(loginData, redirectTo) {
      localStorage.setItem('session', JSON.stringify(loginData.session));
      trackLogin(loginData.log);
      setTimeout(() => {
        window.location.href = redirectTo;
      }, 120);
    }

    function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      // Check admin
      if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
        completeLogin({
          session: { role: 'admin', username },
          log: { role: 'admin', username, name: 'Administrator', userId: '' }
        }, 'admin.html');
        return;
      }

      // Check students
      const user = USERS.find(u => u.username === username && u.password === password);
      if (user) {
        completeLogin({
          session: { role: 'student', userId: user.id, username, name: user.name },
          log: { role: 'student', userId: user.id, username, name: user.name }
        }, 'dashboard.html');
        return;
      }

      errorMsg.style.display = 'block';
    }
  </script>
</body>
</html>
