<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduPortal — My Courses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --panel: #1a1a2e;
      --panel2: #242a47;
      --border: #2a2a48;
      --accent: #00d4ff;
      --accent2: #0099ff;
      --accent3: #a855f7;
      --text: #f8f9fb;
      --muted: #8b92a3;
      --muted2: #b8bfd1;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 10% 10%, rgba(0, 212, 255, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 90% 90%, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse 80% 60% at 50%, rgba(0, 153, 255, 0.08) 0%, transparent 60%);
      pointer-events: none;
      animation: bgFloat 15s ease-in-out infinite;
    }

    @keyframes bgFloat {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13, 13, 26, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0, 212, 255, 0.15);
      padding: 0 32px;
      height: 70px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #00d4ff, #a855f7);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    }
    .logo span { 
      background: linear-gradient(135deg, #00d4ff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-right { display: flex; align-items: center; gap: 20px; }

    .greeting {
      font-size: 14px; color: var(--muted2); font-weight: 500;
    }

    .btn-logout {
      background: transparent;
      border: 1.5px solid rgba(0, 212, 255, 0.3);
      color: var(--accent);
      padding: 9px 18px;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-logout:hover { 
      border-color: var(--accent);
      background: rgba(0, 212, 255, 0.1);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
    }

    /* MAIN */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 52px 32px;
    }

    .page-header { margin-bottom: 44px; }
    .page-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 36px; font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #00d4ff, #f8f9fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-header p { color: var(--muted); font-size: 16px; font-weight: 400; }

    /* COURSE GRID */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .course-card {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.7), rgba(36, 42, 71, 0.5));
      border: 1.5px solid rgba(0, 212, 255, 0.2);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeIn 0.5s ease both;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .course-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent);
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(168, 85, 247, 0.08));
      box-shadow: 
        0 20px 50px rgba(0, 212, 255, 0.2),
        0 0 30px rgba(0, 212, 255, 0.15);
    }

    .course-thumb {
      width: 100%; height: 160px;
      object-fit: cover;
      display: block;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(168, 85, 247, 0.1));
    }

    .course-body { padding: 28px; }

    .course-tag {
      display: inline-block;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.25), rgba(168, 85, 247, 0.15));
      color: var(--accent);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 7px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .course-title {
      font-family: 'Syne', sans-serif;
      font-size: 19px;
      font-weight: 800;
      margin-bottom: 10px;
      color: var(--text);
    }

    .course-desc {
      font-size: 14px;
      color: var(--muted2);
      line-height: 1.6;
      margin-bottom: 18px;
      font-weight: 400;
    }

    .course-meta {
      display: flex; align-items: center; gap: 16px;
      font-size: 13px; color: var(--muted);
      border-top: 1px solid rgba(0, 212, 255, 0.15);
      padding-top: 18px;
      font-weight: 600;
    }

    .meta-item { display: flex; align-items: center; gap: 6px; }

    /* LESSON LIST (shown when course is selected) */
    .lesson-view { display: none; }
    .lesson-view.active { display: block; animation: fadeIn 0.3s ease both; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent;
      border: 1.5px solid rgba(0, 212, 255, 0.3);
      color: var(--accent);
      padding: 10px 18px;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 32px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .back-btn:hover { 
      border-color: var(--accent);
      background: rgba(0, 212, 255, 0.1);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 32px; font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #00d4ff, #f8f9fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .section-desc { color: var(--muted); font-size: 16px; margin-bottom: 32px; font-weight: 400; }

    .lesson-list { display: flex; flex-direction: column; gap: 14px; }

    .lesson-item {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.7), rgba(36, 42, 71, 0.5));
      border: 1.5px solid rgba(0, 212, 255, 0.15);
      border-radius: 13px;
      padding: 22px 26px;
      display: flex; align-items: center; gap: 20px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .lesson-item:hover { 
      border-color: var(--accent);
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.08), rgba(168, 85, 247, 0.08));
      box-shadow: 0 12px 32px rgba(0, 212, 255, 0.15);
    }

    .lesson-num {
      width: 44px; height: 44px; flex-shrink: 0;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.25), rgba(168, 85, 247, 0.15));
      border: 1.5px solid rgba(0, 212, 255, 0.3);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      color: var(--accent);
      font-size: 15px;
    }

    .lesson-info { flex: 1; }
    .lesson-title { font-weight: 700; font-size: 16px; margin-bottom: 5px; } 
    .lesson-desc  { font-size: 14px; color: var(--muted2); font-weight: 400; }

    .lesson-duration {
      font-size: 13px; color: var(--accent);
      display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
      font-weight: 600;
    }

    .play-icon {
      width: 40px; height: 40px; flex-shrink: 0;
      background: linear-gradient(135deg, #00d4ff, #a855f7);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
      transition: all 0.3s ease;
    }

    .lesson-item:hover .play-icon {
      transform: scale(1.1);
      box-shadow: 0 0 28px rgba(0, 212, 255, 0.4);
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 56px; margin-bottom: 18px; }
    .empty-state h2 { font-family: 'Syne', sans-serif; font-size: 22px; color: var(--muted2); margin-bottom: 10px; font-weight: 800; }
    .empty-state p { font-size: 15px; line-height: 1.5; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">
      <div class="logo-icon">🎓</div>
      Edu<span>Portal</span>
    </div>
    <div class="nav-right">
      <span class="greeting" id="greetingText"></span>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <main>
    <!-- Course Grid -->
    <div id="coursesView">
      <div class="page-header">
        <h1>My Courses</h1>
        <p>Select a course below to view its lessons.</p>
      </div>
      <div class="courses-grid" id="coursesGrid"></div>
    </div>

    <!-- Lesson List -->
    <div class="lesson-view" id="lessonView">
      <button class="back-btn" onclick="showCourses()">← Back to Course</button>
      <div class="section-title" id="lessonCourseTitle"></div>
      <div class="section-desc" id="lessonCourseDesc"></div>
      <div class="lesson-list" id="lessonList"></div>
    </div>
  </main>

  <script src="data.js"></script>
  <script>
    // Auth guard
    const session = JSON.parse(localStorage.getItem('session') || 'null');
    if (!session || session.role !== 'student') window.location.href = 'index.html';

    document.getElementById('greetingText').textContent = `Hello, ${session.name || session.username}`;

    const user = USERS.find(u => u.id === session.userId);
    
    // DEBUG: Log user and their lesson access
    console.log('Current User:', user);
    console.log('User ID:', session.userId);
    console.log('Lesson Access:', user ? user.lessonAccess : null);

    function getAllowedLessons(course, currentUser) {
      const allLessons = Array.isArray(course.lessons) ? course.lessons : [];
      const accessMap = currentUser && currentUser.lessonAccess && typeof currentUser.lessonAccess === 'object'
        ? currentUser.lessonAccess
        : null;

      // Backward compatible: if no lessonAccess defined for this course, allow all lessons.
      if (!accessMap || !Object.prototype.hasOwnProperty.call(accessMap, course.id)) {
        console.log(`No lessonAccess for course ${course.id}, showing all ${allLessons.length} lessons`);
        return allLessons;
      }

      const allowedIds = Array.isArray(accessMap[course.id]) ? accessMap[course.id] : [];
      const filtered = allLessons.filter(lesson => allowedIds.includes(lesson.id));
      console.log(`Course ${course.id}: allowing ${filtered.length} of ${allLessons.length} lessons`, allowedIds);
      return filtered;
    }

    function renderCourses() {
      const grid = document.getElementById('coursesGrid');
      const userCourses = COURSES.filter(c => user && user.courses.includes(c.id));

      if (userCourses.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="icon">📭</div>
            <h2>No courses assigned yet</h2>
            <p>Contact your administrator to get access to courses.</p>
          </div>`;
        return;
      }

      grid.innerHTML = userCourses.map((c, i) => {
        const allowedLessons = getAllowedLessons(c, user);
        return `
        <div class="course-card" style="animation-delay:${i * 0.08}s" onclick="showLessons('${c.id}')">
          <img class="course-thumb" src="${c.thumbnail}" alt="${c.title}" onerror="this.style.background='#1e2a3a';this.removeAttribute('src')" />
          <div class="course-body">
            <div class="course-tag">Course</div>
            <div class="course-title">${c.title}</div>
            <div class="course-desc">${c.description}</div>
            <div class="course-meta">
              <span class="meta-item">📚 ${allowedLessons.length} lesson${allowedLessons.length !== 1 ? 's' : ''}</span>
            </div>
          </div>
        </div>
      `;
      }).join('');
    }

    function showLessons(courseId) {
      const course = COURSES.find(c => c.id === courseId);
      if (!course) return;
      const allowedLessons = getAllowedLessons(course, user);

      document.getElementById('coursesView').style.display = 'none';
      document.getElementById('lessonView').classList.add('active');
      document.getElementById('lessonCourseTitle').textContent = course.title;
      document.getElementById('lessonCourseDesc').textContent = course.description;

      if (!allowedLessons.length) {
        document.getElementById('lessonList').innerHTML = `
          <div class="empty-state" style="padding:32px;">
            <div class="icon">🔒</div>
            <h2>No lessons assigned in this course</h2>
            <p>Contact your administrator to enable lesson access.</p>
          </div>`;
        return;
      }

      document.getElementById('lessonList').innerHTML = allowedLessons.map((l, i) => `
        <div class="lesson-item" onclick="openVideo('${l.driveId}', '${l.title.replace(/'/g,"\\'")}', '${course.id.replace(/'/g,"\\'")}', '${l.id.replace(/'/g,"\\'")}')">
          <div class="lesson-num">${i + 1}</div>
          <div class="lesson-info">
            <div class="lesson-title">${l.title}</div>
            <div class="lesson-desc">${l.description}</div>
          </div>
          <div class="lesson-duration">⏱ ${l.duration}</div>
          <div class="play-icon">▶</div>
        </div>
      `).join('');
    }

    function showCourses() {
      document.getElementById('coursesView').style.display = '';
      document.getElementById('lessonView').classList.remove('active');
    }

    function openVideo(driveId, title, courseId, lessonId) {
      if (!driveId || driveId === 'YOUR_DRIVE_FILE_ID_HERE') {
        alert('Video not available yet. The admin needs to add the Google Drive file ID.');
        return;
      }
      localStorage.setItem('currentVideo', JSON.stringify({ driveId, title, courseId, lessonId }));
      window.location.href = 'player.html';
    }

    function logout() {
      localStorage.removeItem('session');
      window.location.href = 'index.html';
    }

    renderCourses();
  </script>
</body>
</html>
